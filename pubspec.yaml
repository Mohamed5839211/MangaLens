name: manga_lens
description: "MangaLens - Manga/Manhwa reading and real-time Arabic translation app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  flutter_riverpod: ^2.5.1

  # WebView & Ad Blocking
  flutter_inappwebview: ^6.1.5

  # OCR (On-Device)
  google_mlkit_text_recognition: ^0.15.1

  # Image Processing / Inpainting (OpenCV)
  opencv_dart: ^2.2.1

  # HTTP Client (Groq API)
  dio: ^5.9.2

  # Secure Storage (API Keys)
  flutter_secure_storage: ^10.2.0

  # Image manipulation
  image: ^4.5.3

  # UI Animations (Framer Motion style)
  flutter_animate: ^4.5.0
  flutter_dotenv: ^6.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  pdf: ^3.12.0
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/localization/
    - .env
